<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TS — Visualiseur d'algorithmes</title>
<style>
  :root {
    color-scheme: light;

    --paper: #fffaf0;
    --paper-2: #f7efe2;
    --ink: #102542;
    --ink-soft: #516579;
    --navy: #0c2c4f;
    --navy-2: #15436e;
    --gold: #d6b46f;
    --gold-2: #f1d997;
    --cream: #fffdf8;
    --line: rgba(12,44,79,.16);
    --line-strong: rgba(12,44,79,.28);
    --blue: #2276d2;
    --cyan: #42c8e8;
    --orange: #f0a93b;
    --rose: #ec5a6a;
    --green: #23a978;
    --violet: #7c5ee7;
    --shadow: 0 24px 70px rgba(16,37,66,.16);
    --shadow-soft: 0 12px 34px rgba(16,37,66,.10);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    min-height: 100%;
  }

  body {
    min-height: 100svh;
    overflow-x: hidden;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 16% 12%, rgba(214,180,111,.30), transparent 28%),
      radial-gradient(circle at 78% 20%, rgba(34,118,210,.15), transparent 30%),
      radial-gradient(circle at 44% 94%, rgba(66,200,232,.15), transparent 34%),
      linear-gradient(145deg, #fffdf8, #f7efe2 72%, #fff7df);
    color: var(--ink);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(12,44,79,.035) 1px, transparent 1px),
      linear-gradient(rgba(12,44,79,.035) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: radial-gradient(circle at 48% 45%, black, transparent 78%);
  }

  .app {
    width: min(1180px, calc(100vw - 26px));
    min-height: 100svh;
    margin: 0 auto;
    padding: 20px 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 285px;
    gap: 16px;
    align-items: center;
    position: relative;
  }

  .canvas-card,
  .side {
    border: 1px solid var(--line);
    background:
      linear-gradient(180deg, rgba(255,255,255,.84), rgba(255,250,240,.74));
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.94);
    backdrop-filter: blur(20px);
  }

  .canvas-card {
    min-height: min(730px, calc(100svh - 40px));
    border-radius: 38px;
    padding: clamp(18px, 4vw, 44px);
    display: grid;
    grid-template-rows: auto minmax(370px, 1fr) auto;
    position: relative;
    overflow: hidden;
  }

  .canvas-card::after {
    content: "";
    position: absolute;
    width: 520px;
    height: 520px;
    right: -260px;
    top: -270px;
    border-radius: 50%;
    border: 1px solid rgba(214,180,111,.35);
    box-shadow: inset 0 0 90px rgba(214,180,111,.16);
  }

  .header {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }

  .mark {
    font-size: 12px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 950;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(29px, 5.2vw, 60px);
    line-height: .95;
    letter-spacing: -.065em;
    color: var(--navy);
    text-shadow: 0 12px 34px rgba(12,44,79,.10);
  }

  .top-tools {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .mode-chip {
    border: 1px solid var(--line);
    color: var(--navy);
    background: rgba(255,255,255,.78);
    box-shadow: var(--shadow-soft);
    border-radius: 999px;
    padding: 10px 13px;
    font-size: 12px;
    font-weight: 950;
    white-space: nowrap;
  }

  .language-switch {
    display: flex;
    gap: 4px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.74);
    box-shadow: var(--shadow-soft);
    padding: 4px;
    border-radius: 999px;
  }

  .lang-btn {
    border: 0;
    min-width: 42px;
    height: 29px;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 1000;
    letter-spacing: .06em;
    cursor: pointer;
    transition: .16s ease;
  }

  .lang-btn.active {
    color: #fff8e7;
    background: linear-gradient(145deg, var(--navy), var(--navy-2));
    box-shadow: 0 8px 20px rgba(12,44,79,.18);
  }

  .stage {
    min-height: 386px;
    margin: 18px 0 14px;
    border: 1px solid rgba(12,44,79,.12);
    border-radius: 34px;
    background:
      radial-gradient(circle at 50% 18%, rgba(255,255,255,.96), transparent 26%),
      linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,246,225,.58));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.92),
      inset 0 -18px 45px rgba(214,180,111,.09);
    overflow: hidden;
    display: flex;
    align-items: end;
    justify-content: center;
    padding: 30px 12px 38px;
    position: relative;
    z-index: 1;
  }

  .stage::before {
    content: "";
    position: absolute;
    inset: auto 8% 18px 8%;
    height: 22px;
    border-radius: 999px;
    background: radial-gradient(ellipse, rgba(12,44,79,.16), transparent 72%);
    filter: blur(6px);
  }

  .bars {
    width: 100%;
    height: clamp(310px, 52svh, 455px);
    display: flex;
    align-items: end;
    justify-content: center;
    gap: clamp(6px, 1vw, 14px);
    position: relative;
    z-index: 2;
  }

  .bar-wrap {
    height: 100%;
    display: flex;
    align-items: end;
    justify-content: center;
    transition:
      transform .34s cubic-bezier(.22,1,.36,1),
      opacity .28s ease,
      filter .28s ease;
    will-change: transform, opacity, filter;
    position: relative;
    padding-bottom: 25px;
  }

  .bar-wrap::after {
    content: attr(data-index);
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    min-width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(12,44,79,.13);
    border-radius: 999px;
    background: rgba(255,255,255,.62);
    color: rgba(12,44,79,.62);
    font-size: 10px;
    font-weight: 1000;
    box-shadow: 0 5px 12px rgba(12,44,79,.06);
  }

  .bar {
    width: clamp(27px, 4.15vw, 52px);
    min-height: 52px;
    height: var(--h);
    border-radius: 20px 20px 16px 16px;
    border: 1px solid rgba(255,255,255,.72);
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.28) 18%, rgba(12,44,79,.96)),
      linear-gradient(135deg, #2d6da7, var(--navy));
    box-shadow:
      0 14px 30px rgba(12,44,79,.25),
      0 0 30px rgba(34,118,210,.20),
      inset 0 1px 0 rgba(255,255,255,.96);
    display: grid;
    place-items: center;
    transition:
      height .34s cubic-bezier(.22,1,.36,1),
      background .22s ease,
      box-shadow .22s ease,
      transform .22s ease,
      outline .22s ease;
    position: relative;
    overflow: visible;
    will-change: height, transform;
  }

  .number {
    color: #fff8e7;
    font-weight: 1000;
    font-size: clamp(11px, 1.6vw, 15px);
    letter-spacing: -.06em;
    text-shadow: 0 2px 9px rgba(0,0,0,.42);
    user-select: none;
  }

  .bar-wrap.compare .bar {
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.25) 18%, rgba(240,169,59,.98)),
      linear-gradient(135deg, #ffe7a3, var(--orange));
    box-shadow:
      0 16px 34px rgba(240,169,59,.30),
      0 0 44px rgba(240,169,59,.42),
      inset 0 1px 0 rgba(255,255,255,.95);
    transform: translateY(-14px);
  }

  .bar-wrap.swap .bar,
  .bar-wrap.shift .bar {
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.25) 18%, rgba(236,90,106,.98)),
      linear-gradient(135deg, #ffb4bd, var(--rose));
    box-shadow:
      0 18px 38px rgba(236,90,106,.28),
      0 0 48px rgba(236,90,106,.45),
      inset 0 1px 0 rgba(255,255,255,.95);
    transform: translateY(-22px) scale(1.045);
  }

  .bar-wrap.sorted .bar {
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.25) 18%, rgba(35,169,120,.98)),
      linear-gradient(135deg, #8ee7c2, var(--green));
    box-shadow:
      0 17px 35px rgba(35,169,120,.25),
      0 0 43px rgba(35,169,120,.34),
      inset 0 1px 0 rgba(255,255,255,.95);
  }

  .bar-wrap.key .bar,
  .bar-wrap.mid .bar,
  .bar-wrap.min .bar {
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.25) 18%, rgba(124,94,231,.98)),
      linear-gradient(135deg, #c4b5fd, var(--violet));
    box-shadow:
      0 18px 38px rgba(124,94,231,.26),
      0 0 48px rgba(124,94,231,.40),
      inset 0 1px 0 rgba(255,255,255,.95);
    transform: translateY(-19px);
  }

  .bar-wrap.low .bar,
  .bar-wrap.high .bar {
    outline: 3px solid rgba(66,200,232,.42);
    outline-offset: 5px;
  }

  .bar-wrap.found .bar {
    background:
      linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.25) 18%, rgba(22,136,93,.98)),
      linear-gradient(135deg, #34d399, #16885d);
    box-shadow:
      0 22px 52px rgba(22,136,93,.36),
      0 0 62px rgba(22,136,93,.50);
    transform: translateY(-24px) scale(1.08);
  }

  .bar-wrap.checked:not(.found),
  .bar-wrap.out {
    opacity: .35;
    filter: grayscale(.4) saturate(.72);
  }

  .signal {
    height: 44px;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .01em;
    position: relative;
    z-index: 2;
  }

  .signal.error {
    color: #b42339;
  }

  .side {
    border-radius: 34px;
    padding: 18px;
    position: sticky;
    top: 18px;
    z-index: 4;
  }

  .brand {
    display: grid;
    place-items: center;
    padding: 10px 8px 18px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .logo {
    width: 104px;
    height: auto;
    filter: drop-shadow(0 18px 28px rgba(12,44,79,.22));
  }

  .mini-name {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-weight: 1000;
    color: var(--navy);
  }

  .menu {
    display: grid;
    gap: 8px;
  }

  .menu-btn {
    border: 1px solid var(--line);
    border-radius: 18px;
    min-height: 50px;
    background: rgba(255,255,255,.66);
    color: var(--ink);
    display: grid;
    grid-template-columns: 36px 1fr;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    text-align: left;
    cursor: pointer;
    transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }

  .menu-btn:hover {
    transform: translateX(-2px);
    border-color: var(--line-strong);
    box-shadow: 0 10px 24px rgba(12,44,79,.09);
  }

  .menu-btn.active {
    background: linear-gradient(135deg, rgba(214,180,111,.31), rgba(255,255,255,.82));
    border-color: rgba(214,180,111,.72);
    box-shadow: 0 14px 34px rgba(214,180,111,.17);
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 13px;
    display: grid;
    place-items: center;
    color: #fff8e7;
    background:
      linear-gradient(145deg, var(--navy), var(--navy-2));
    box-shadow: 0 10px 22px rgba(12,44,79,.20);
    font-size: 12px;
    font-weight: 1000;
  }

  .menu-btn.active .icon {
    background:
      linear-gradient(145deg, var(--gold), var(--navy));
  }

  .menu-btn strong {
    display: block;
    font-size: 14px;
    letter-spacing: -.025em;
  }

  .controls {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    display: grid;
    gap: 9px;
  }

  .search-box {
    display: none;
    gap: 8px;
  }

  .search-box.show {
    display: grid;
  }

  input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 15px;
    min-height: 44px;
    padding: 0 13px;
    background: rgba(255,255,255,.72);
    color: var(--navy);
    font-weight: 900;
    font-size: 15px;
    outline: none;
  }

  input:focus {
    border-color: rgba(214,180,111,.85);
    box-shadow: 0 0 0 4px rgba(214,180,111,.18);
  }

  .speed-control {
    display: grid;
    gap: 7px;
  }

  .speed-label {
    color: var(--ink-soft);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    font-weight: 1000;
    padding-left: 4px;
  }

  .speed-line {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    padding: 5px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,.62);
  }

  .speed-btn {
    border: 0;
    min-height: 32px;
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    font-size: 10px;
    letter-spacing: .07em;
    text-transform: uppercase;
    font-weight: 1000;
    cursor: pointer;
    transition: .16s ease;
  }

  .speed-btn.active {
    color: #fff8e7;
    background: linear-gradient(145deg, var(--gold), var(--navy));
    box-shadow: 0 9px 22px rgba(12,44,79,.16);
  }

  .btn {
    border: 1px solid transparent;
    border-radius: 999px;
    min-height: 45px;
    font-weight: 1000;
    letter-spacing: .07em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
  }

  .btn-main {
    color: #fff8e7;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,.32), transparent 42%),
      linear-gradient(145deg, var(--navy), #174b78);
    box-shadow: 0 15px 32px rgba(12,44,79,.24);
  }

  .btn-soft {
    color: var(--navy);
    border-color: var(--line);
    background: rgba(255,255,255,.66);
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .btn:disabled {
    cursor: wait;
    opacity: .48;
    transform: none;
  }

  .copy {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 11px;
    line-height: 1.45;
    text-align: center;
    font-weight: 800;
  }

  @media (max-width: 880px) {
    body {
      overflow-y: auto;
    }

    .app {
      width: min(100vw - 16px, 720px);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 8px 0 16px;
      gap: 10px;
    }

    .side {
      order: 0;
      width: 100%;
      position: static;
      border-radius: 24px;
      padding: 10px;
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .brand {
      padding: 0;
      margin: 0;
      border: 0;
    }

    .logo {
      width: 62px;
    }

    .mini-name,
    .copy {
      display: none;
    }

    .mobile-panel {
      min-width: 0;
    }

    .menu {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 1px 0 2px;
    }

    .menu::-webkit-scrollbar {
      display: none;
    }

    .menu-btn {
      flex: 0 0 154px;
      min-height: 47px;
      grid-template-columns: 31px 1fr;
      border-radius: 16px;
      padding: 7px 9px;
    }

    .icon {
      width: 31px;
      height: 31px;
      border-radius: 11px;
      font-size: 10px;
    }

    .menu-btn strong {
      font-size: 12px;
    }

    .controls {
      margin-top: 8px;
      padding-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .search-box.show {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr;
    }

    .speed-control {
      grid-column: 1 / -1;
      gap: 5px;
    }

    .speed-label {
      display: none;
    }

    input {
      min-height: 42px;
      border-radius: 14px;
    }

    .btn {
      min-height: 42px;
      font-size: 12px;
    }

    .canvas-card {
      order: 1;
      width: 100%;
      min-height: auto;
      border-radius: 28px;
      padding: 18px;
      grid-template-rows: auto minmax(320px, 1fr) auto;
    }

    .header {
      gap: 10px;
    }

    h1 {
      font-size: clamp(28px, 9vw, 48px);
    }

    .top-tools {
      gap: 6px;
    }

    .mode-chip {
      display: none;
    }

    .language-switch {
      padding: 3px;
    }

    .lang-btn {
      min-width: 36px;
      height: 27px;
      font-size: 10px;
    }

    .stage {
      min-height: 320px;
      border-radius: 25px;
      padding: 24px 7px 36px;
      margin: 14px 0 8px;
    }

    .bars {
      height: 305px;
      gap: 5px;
    }

    .bar-wrap {
      padding-bottom: 22px;
    }

    .bar-wrap::after {
      width: 17px;
      height: 17px;
      font-size: 9px;
    }

    .bar {
      width: clamp(22px, 7vw, 35px);
      min-height: 46px;
      border-radius: 15px;
    }

    .number {
      font-size: 10px;
    }

    .signal {
      height: 42px;
      font-size: 12px;
      padding: 0 8px;
    }
  }

  @media (max-width: 390px) {
    .side {
      grid-template-columns: 64px minmax(0, 1fr);
    }

    .logo {
      width: 54px;
    }

    .menu-btn {
      flex-basis: 144px;
    }

    .stage {
      padding-left: 5px;
      padding-right: 5px;
    }

    .bars {
      gap: 4px;
    }

    .bar {
      width: 21px;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <section class="canvas-card">
      <header class="header">
        <div>
          <div class="mark" data-i18n="mark">TS Visual</div>
          <h1 id="title">Tri à bulle</h1>
        </div>

        <div class="top-tools">
          <div class="language-switch" aria-label="Language">
            <button class="lang-btn active" data-lang="fr">FR</button>
            <button class="lang-btn" data-lang="en">EN</button>
          </div>
          <div class="mode-chip" id="chip">Tri</div>
        </div>
      </header>

      <section class="stage" aria-label="Visualisation">
        <div class="bars" id="bars"></div>
      </section>

      <div class="signal" id="signal">Prêt</div>
    </section>

        linear: "Recherche séquentielle",
        binary: "Recherche dichotomique"
      }
    },
    en: {
      mark: "TS Visual",
      typeSort: "Sort",
      typeSearch: "Search",
      ready: "Ready",
      start: "Start",
      new: "New",
      speedLabel: "Speed",
      speedLow: "Low",
      speedMedium: "Medium",
      speedHigh: "High",
      input: "Value to search",
      enterValue: "Enter a value to search.",
      invalid: "Invalid value.",
      notFound: value => "Error: " + value + " does not exist in the current table.",
      anim: "Animation",
      compare: "Comparing",
      swap: "Swap",
      fixed: "Fixed",
      minimum: "Minimum",
      newMinimum: "New minimum",
      key: "Key",
      insertion: "Insertion",
      shift: "Shift",
      placed: "Placed",
      search: "Search",
      middle: "Middle",
      filter: "Filtering",
      found: value => "Found: " + value,
      done: "Done",
      modes: {
        bubble: "Bubble sort",
        selection: "Selection sort",
        insertion: "Insertion sort",
        linear: "Sequential search",
        binary: "Binary search"
      }
    }
  };

  const speedMap = {
    low: { compare: 430, swap: 410, step: 480, pass: 540, finish: 90 },
    medium: { compare: 285, swap: 270, step: 330, pass: 390, finish: 64 },
    high: { compare: 155, swap: 145, step: 190, pass: 230, finish: 38 }
  };

  let mode = "bubble";
  let language = "fr";
  let speedMode = "medium";
  let values = [];
  let running = false;

  function T() {
    return text[language];
  }

  function SPEED() {
    return speedMap[speedMode];
  }

  function itemCount() {
    if (window.innerWidth < 390) return 9;
    if (window.innerWidth < 880) return 10;
    return 12;
  }

  function makeValues(sorted = false) {
    const used = new Set();
    const arr = [];

    while (arr.length < itemCount()) {
      const n = Math.floor(12 + Math.random() * 88);
      if (!used.has(n)) {
        used.add(n);
        arr.push(n);
      }
    }

    return sorted ? arr.sort((a, b) => a - b) : arr;
  }

  function setSignal(message, error = false) {
    signalEl.textContent = message;
    signalEl.classList.toggle("error", error);
  }

  function modeIsSearch() {
    return mode === "linear" || mode === "binary";
  }

  function render(state = {}) {
    const {
      compare = [],
      swap = [],
      sorted = [],
      checked = [],
      found = [],
      low = null,
      high = null,
      mid = null,
      key = null,
      min = null,
      out = []
    } = state;

    const compareSet = new Set(compare);
    const swapSet = new Set(swap);
    const sortedSet = new Set(sorted);
    const checkedSet = new Set(checked);
    const foundSet = new Set(found);
    const outSet = new Set(out);

    const max = Math.max(...values, 1);
    barsEl.innerHTML = "";

    values.forEach((value, index) => {
      const wrap = document.createElement("div");
      wrap.className = "bar-wrap";
      wrap.dataset.index = index;

      if (compareSet.has(index)) wrap.classList.add("compare");
      if (swapSet.has(index)) wrap.classList.add("swap");
      if (sortedSet.has(index)) wrap.classList.add("sorted");
      if (checkedSet.has(index)) wrap.classList.add("checked");
      if (foundSet.has(index)) wrap.classList.add("found");
      if (low === index) wrap.classList.add("low");
      if (high === index) wrap.classList.add("high");
      if (mid === index) wrap.classList.add("mid");
      if (key === index) wrap.classList.add("key");
      if (min === index) wrap.classList.add("min");
      if (outSet.has(index)) wrap.classList.add("out");

      const bar = document.createElement("div");
      bar.className = "bar";
      bar.style.setProperty("--h", (26 + (value / max) * 74) + "%");

      const n = document.createElement("span");
      n.className = "number";
      n.textContent = value;

      bar.appendChild(n);
      wrap.appendChild(bar);
      barsEl.appendChild(wrap);
    });
  }

  function updateLanguageUI() {
    document.querySelector('[data-i18n="mark"]').textContent = T().mark;
    document.querySelector('[data-i18n="speedLabel"]').textContent = T().speedLabel;
    document.querySelector('[data-i18n="speedLow"]').textContent = T().speedLow;
    document.querySelector('[data-i18n="speedMedium"]').textContent = T().speedMedium;
    document.querySelector('[data-i18n="speedHigh"]').textContent = T().speedHigh;
    startBtn.textContent = T().start;
    newBtn.textContent = T().new;
    searchInput.placeholder = T().input;

    Object.keys(T().modes).forEach(key => {
      const label = document.querySelector('[data-label="' + key + '"]');
      if (label) label.textContent = T().modes[key];
    });

    titleEl.textContent = T().modes[mode];
    chipEl.textContent = modeIsSearch() ? T().typeSearch : T().typeSort;
    setSignal(T().ready);
    document.documentElement.lang = language;
  }

  function resetValues() {
    values = makeValues(mode === "binary");
    render();
    setSignal(T().ready);
  }

  function updateMode(next) {
    if (running) return;
    mode = next;

    menuBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
    titleEl.textContent = T().modes[mode];
    chipEl.textContent = modeIsSearch() ? T().typeSearch : T().typeSort;
    searchBox.classList.toggle("show", modeIsSearch());
    searchInput.value = "";

    resetValues();
  }

  function setSpeed(next) {
    speedMode = next;
    speedBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.speed === speedMode));
  }

  function setLanguage(next) {
    if (running) return;
    language = next;
    langBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.lang === language));
    updateLanguageUI();
  }

  function wantedValue() {
    const raw = searchInput.value.trim();

    if (!modeIsSearch()) return null;

    if (raw === "") {
      setSignal(T().enterValue, true);
      searchInput.focus();
      return false;
    }

    const value = Number(raw);

    if (!Number.isInteger(value)) {
      setSignal(T().invalid, true);
      searchInput.focus();
      return false;
    }

    if (!values.includes(value)) {
      setSignal(T().notFound(value), true);
      searchInput.focus();
      return false;
    }

    return value;
  }

  async function finishSweep() {
    const sorted = [];
    for (let i = 0; i < values.length; i++) {
      sorted.push(i);
      render({ sorted });
      await sleep(SPEED().finish);
    }
  }

  async function triBulle() {
    let sorted = [];
    for (let pass = 0; pass < values.length - 1; pass++) {
      let changed = false;

      for (let i = 0; i < values.length - 1 - pass; i++) {
        render({ compare: [i, i + 1], sorted });
        setSignal(T().compare);
        await sleep(SPEED().compare);

        if (values[i] > values[i + 1]) {
          render({ swap: [i, i + 1], sorted });
          setSignal(T().swap);
          await sleep(SPEED().swap);

          [values[i], values[i + 1]] = [values[i + 1], values[i]];
          changed = true;

          render({ swap: [i, i + 1], sorted });
          await sleep(SPEED().swap);
        }
      }

      sorted.push(values.length - 1 - pass);
      render({ sorted });
      setSignal(T().fixed);
      await sleep(SPEED().pass);

      if (!changed) break;
    }

    await finishSweep();
    setSignal(T().done);
  }

  async function triSelection() {
    let sorted = [];

    for (let i = 0; i < values.length - 1; i++) {
      let minIndex = i;

      render({ min: minIndex, sorted });
      setSignal(T().minimum);
      await sleep(SPEED().step);

      for (let j = i + 1; j < values.length; j++) {
        render({ compare: [minIndex, j], min: minIndex, sorted });
        setSignal(T().compare);
        await sleep(SPEED().compare);

        if (values[j] < values[minIndex]) {
          minIndex = j;
          render({ min: minIndex, sorted });
          setSignal(T().newMinimum);
          await sleep(SPEED().step);
        }
      }

      if (minIndex !== i) {
        render({ swap: [i, minIndex], sorted });
        setSignal(T().swap);
        await sleep(SPEED().swap);
        [values[i], values[minIndex]] = [values[minIndex], values[i]];
      }

      sorted.push(i);
      render({ sorted });
      setSignal(T().fixed);
      await sleep(SPEED().pass);
    }

    await finishSweep();
    setSignal(T().done);
  }

  async function triInsertion() {
    render({ sorted: [0] });
    setSignal(T().key);
    await sleep(SPEED().pass);

    for (let i = 1; i < values.length; i++) {
      const keyValue = values[i];
      let j = i - 1;

      render({ key: i, sorted: Array.from({ length: i }, (_, k) => k) });
      setSignal(T().insertion);
      await sleep(SPEED().step);

      while (j >= 0 && values[j] > keyValue) {
        render({ compare: [j], key: j + 1, sorted: Array.from({ length: i }, (_, k) => k) });
        setSignal(T().shift);
        await sleep(SPEED().compare);

        values[j + 1] = values[j];
        render({ swap: [j, j + 1] });
        await sleep(SPEED().swap);
        j--;
      }

      values[j + 1] = keyValue;
      render({ key: j + 1, sorted: Array.from({ length: i + 1 }, (_, k) => k) });
      setSignal(T().placed);
      await sleep(SPEED().pass);
    }

    await finishSweep();
    setSignal(T().done);
  }

  async function rechercheSeq(target) {
    const checked = [];

    for (let i = 0; i < values.length; i++) {
      render({ compare: [i], checked });
      setSignal(T().search);
      await sleep(SPEED().step);

      if (values[i] === target) {
        render({ found: [i], checked });
        setSignal(T().found(target));
        return;
      }

      checked.push(i);
      render({ checked });
      await sleep(SPEED().compare);
    }
  }

  async function rechercheDicho(target) {
    values.sort((a, b) => a - b);
    render();
    await sleep(SPEED().step);

    let low = 0;
    let high = values.length - 1;
    const out = new Set();

    while (low <= high) {
      const mid = Math.floor((low + high) / 2);

      render({ low, high, mid, out: [...out] });
      setSignal(T().middle);
      await sleep(SPEED().pass);

      if (values[mid] === target) {
        render({ found: [mid], low, high, mid, out: [...out] });
        setSignal(T().found(target));
        return;
      }

      if (values[mid] < target) {
        for (let i = low; i <= mid; i++) out.add(i);
        low = mid + 1;
      } else {
        for (let i = mid; i <= high; i++) out.add(i);
        high = mid - 1;
      }

      render({ low: low <= high ? low : null, high: low <= high ? high : null, out: [...out] });
      setSignal(T().filter);
      await sleep(SPEED().pass);
    }
  }

  async function start() {
    if (running) return;

    const target = wantedValue();
    if (target === false) return;

    running = true;
    startBtn.disabled = true;
    newBtn.disabled = true;
    searchInput.disabled = true;
    setSignal(T().anim);

    if (mode === "bubble") await triBulle();
    if (mode === "selection") await triSelection();
    if (mode === "insertion") await triInsertion();
    if (mode === "linear") await rechercheSeq(target);
    if (mode === "binary") await rechercheDicho(target);

    running = false;
    startBtn.disabled = false;
    newBtn.disabled = false;
    searchInput.disabled = false;
  }

  menuBtns.forEach(btn => btn.addEventListener("click", () => updateMode(btn.dataset.mode)));
  speedBtns.forEach(btn => btn.addEventListener("click", () => setSpeed(btn.dataset.speed)));
  langBtns.forEach(btn => btn.addEventListener("click", () => setLanguage(btn.dataset.lang)));

  startBtn.addEventListener("click", start);
  newBtn.addEventListener("click", () => {
    if (!running) {
      searchInput.value = "";
      resetValues();
    }
  });

  searchInput.addEventListener("keydown", event => {
    if (event.key === "Enter") start();
  });

  window.addEventListener("resize", () => {
    if (!running) resetValues();
  });

  updateLanguageUI();
  resetValues();
</script>
</body>
</html>
